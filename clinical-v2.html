<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TCM Clinical Intake</title>
<style>
body { font-family: Arial; padding:20px; max-width:600px; margin:auto; }
h2 { margin-bottom:10px; }
button {
  display:block;
  width:100%;
  padding:14px;
  margin:8px 0;
  border:none;
  background:#f2f2f2;
  border-radius:10px;
  font-size:16px;
}
button.selected { background:#4CAF50; color:white; }
.result { margin-top:20px; padding:15px; border:1px solid #ccc; border-radius:10px; }
.small { font-size:13px; color:#666; }
</style>
</head>

<body>

<h2>TCM Quick Intake</h2>
<div id="quiz"></div>
<div class="result" id="result"></div>

<script>

// ---------------- QUESTIONS ----------------
const questions = [
{
q:"Main issue",
a:["stress","fatigue","pain","digestive","sleep"]
},
{
q:"Drink preference",
a:["cold_large","warm_sips","no_thirst"]
},
{
q:"Sleep pattern",
a:["hard_to_fall_asleep","wake_during_night","wake_early"]
},
{
q:"Pain behavior",
a:["better_movement","better_rest","fixed_sharp","no_pain"]
},
{
q:"How does your body feel?",
a:["heavy_foggy","dry_thirsty","normal"]
}
];

let answers = [];

// ---------------- UI ----------------
function renderQuestion(i){
  const q = questions[i];
  let html = `<h3>${q.q}</h3>`;
  q.a.forEach(a=>{
    html += `<button onclick="selectAnswer(${i}, '${a}')">${formatLabel(a)}</button>`;
  });
  document.getElementById("quiz").innerHTML = html;
}

function formatLabel(val){
  return val.replace(/_/g," ");
}

function selectAnswer(i, val){
  answers[i] = val;
  if(i < questions.length-1){
    renderQuestion(i+1);
  } else {
    analyze();
  }
}

// ---------------- PATTERN ENGINE ----------------
const patterns = {

"Liver Qi Stagnation": {
  sym:{stress:3, better_movement:2},
  base:"Xiao Yao San",
  heat:"Jia Wei Xiao Yao San"
},

"Liver Fire": {
  sym:{stress:2, cold_large:2},
  base:"Long Dan Xie Gan Tang"
},

"Heart Fire": {
  sym:{hard_to_fall_asleep:3, cold_large:2},
  base:"Dao Chi San"
},

"Kidney Yin Deficiency": {
  sym:{wake_during_night:3, dry_thirsty:2},
  base:"Liu Wei Di Huang Wan",
  heat:"Zhi Bai Di Huang Wan"
},

"Kidney Yang Deficiency": {
  sym:{fatigue:2, warm_sips:2},
  base:"Jin Gui Shen Qi Wan"
},

"Spleen Qi Deficiency": {
  sym:{fatigue:3, better_rest:2},
  base:"Si Jun Zi Tang"
},

"Spleen Yang Deficiency": {
  sym:{fatigue:2, warm_sips:2, better_rest:2},
  base:"Li Zhong Wan"
},

"Damp Accumulation": {
  sym:{heavy_foggy:3, no_thirst:2},
  base:"Ping Wei San"
},

"Phlegm Damp": {
  sym:{heavy_foggy:3},
  base:"Er Chen Tang"
},

"Phlegm Heat": {
  sym:{heavy_foggy:2, cold_large:2},
  base:"Qing Qi Hua Tan Wan"
},

"Blood Stasis": {
  sym:{fixed_sharp:3},
  base:"Xue Fu Zhu Yu Tang"
},

"Qi Stagnation": {
  sym:{better_movement:2, stress:2},
  base:"Yue Ju Wan"
},

"Blood Deficiency": {
  sym:{wake_early:2, dry_thirsty:2},
  base:"Si Wu Tang"
},

"Heart Blood Deficiency": {
  sym:{wake_early:3},
  base:"Gui Pi Tang"
},

"Heart Kidney Disharmony": {
  sym:{wake_during_night:2, anxiety:2},
  base:"Tian Wang Bu Xin Dan"
},

"Interior Heat": {
  sym:{cold_large:3},
  base:"Bai Hu Tang"
},

"Interior Cold": {
  sym:{warm_sips:3},
  base:"Li Zhong Wan"
},

"Liver Overacting Spleen": {
  sym:{stress:3, digestive:2},
  base:"Xiao Yao San"
}

};

// ---------------- ANALYSIS ----------------
function analyze(){

  let scores = {};

  for (let p in patterns){
    let score = 0;
    for (let s in patterns[p].sym){
      if (answers.includes(s)) score += patterns[p].sym[s];
    }
    scores[p] = score;
  }

  let sorted = Object.entries(scores).sort((a,b)=>b[1]-a[1]);
  let top = sorted[0];
  let second = sorted[1];

  function selectFormula(p){
    let pat = patterns[p];
    if (answers.includes("cold_large") && pat.heat) return pat.heat;
    return pat.base;
  }

  let html = `<b>Primary Pattern:</b> ${top[0]} (${top[1]})<br>`;

  if (second[1] >= top[1]-1){
    html += `<b>Secondary Pattern:</b> ${second[0]} (${second[1]})<br><br>`;
    html += `<b>Strategy:</b> Combine / harmonize<br>`;
    html += `<b>Formulas:</b><br>- ${selectFormula(top[0])}<br>- ${selectFormula(second[0])}`;
  } else {
    html += `<br><b>Strategy:</b> Single pattern<br>`;
    html += `<b>Formula:</b><br>- ${selectFormula(top[0])}`;
  }

  html += `<div class="small"><br>Based on symptom patterns (TCM model)</div>`;

  document.getElementById("quiz").innerHTML = "";
  document.getElementById("result").innerHTML = html;
}

renderQuestion(0);

</script>

</body>
</html>
